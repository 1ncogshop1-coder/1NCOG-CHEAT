<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1NCOG SHOP | BLUE EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --blue: #00d2ff; --red: #ff4d4d; --bg: #000; --card: rgba(10,10,10,0.95); }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; outline: none; user-select: none; }
        
        body { 
            background: var(--bg); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://i.ibb.co/gZ19Zs5z/IMG-20260403-WA0107-1.jpg');
            background-size: cover; background-position: center;
        }

        #toast { position: fixed; top: -70px; left: 50%; transform: translateX(-50%); background: var(--blue); color: #000; padding: 15px 25px; border-radius: 30px; font-size: 0.85rem; font-weight: 900; transition: 0.6s; z-index: 5000; text-align: center; width: 85%; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        #toast.show { top: 30px; }

        #login-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .login-card { width: 85%; max-width: 320px; text-align: center; }
        .login-card h1 { color: var(--blue); font-size: 2.2rem; margin-bottom: 30px; text-shadow: 0 0 15px var(--blue); font-weight: 900; }
        .login-card input { width: 100%; padding: 18px; background: #080808; border: 1px solid #1a1a1a; color: #fff; border-radius: 15px; text-align: center; margin-bottom: 20px; font-weight: bold; border-bottom: 2px solid var(--blue); text-transform: uppercase; }

        #panel { display: none; width: 92%; max-width: 400px; height: 95vh; flex-direction: column; }
        .header { text-align: center; padding: 15px 0; }
        .header h1 { color: var(--blue); font-size: 1.6rem; letter-spacing: 2px; font-weight: 900; text-shadow: 0 0 10px var(--blue); }

        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 12px; background: rgba(15,15,15,0.8); border: 1px solid #222; color: #555; text-align: center; border-radius: 12px; font-size: 0.6rem; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .tab.active { color: var(--blue); border-color: var(--blue); background: #111; }

        .scroll-area { flex: 1; overflow-y: auto; padding-bottom: 20px; }
        
        .option-item { background: var(--card); border: 1px solid #1a1a1a; padding: 18px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--blue); }
        .opt-info h3 { color: #eee; font-size: 0.9rem; margin-bottom: 4px; }
        .opt-info p { color: #666; font-size: 0.7rem; }
        .status-text { font-size: 0.6rem; display: block; margin-top: 5px; font-weight: 900; }
        .status-off { color: var(--red); }
        .status-on { color: #0f0; }

        /* SWITCHES */
        .switch { position: relative; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #222; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--blue); box-shadow: 0 0 8px var(--blue); }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-blue { width: 100%; padding: 18px; background: var(--blue); color: #000; border: none; border-radius: 15px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .btn-inject-big { background: linear-gradient(90deg, #005f73, var(--blue)); color: #000; padding: 20px; border-radius: 20px; border: none; width: 100%; font-weight: 900; margin-top: 10px; cursor: pointer; text-transform: uppercase; }
        #btn-force-open { display: none; background: #0f0; margin-top: 15px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        .sensi-container { background: var(--card); border: 1px solid var(--blue); padding: 20px; border-radius: 20px; text-align: center; }
        .sensi-select { width: 100%; padding: 12px; background: #000; color: #fff; border: 1px solid #333; border-radius: 10px; margin-bottom: 10px; border-bottom: 2px solid var(--blue); font-size: 0.8rem; }
        .sensi-result { margin-top: 20px; display: none; text-align: left; background: #050505; padding: 15px; border-radius: 15px; border: 1px dashed var(--blue); }
        .sensi-result p { color: #fff; font-size: 0.85rem; margin-bottom: 8px; font-weight: 600; }
        .sensi-result span { color: var(--blue); font-weight: 900; float: right; }
    </style>
</head>
<body>

<div id="toast">MENSAGEM</div>

<div id="login-screen">
    <div class="login-card">
        <h1>1NCOG SHOP</h1>
        <input type="text" id="key" placeholder="COLE SUA KEY BLUE AQUI">
        <button class="btn-blue" onclick="validar()">AUTENTICAR</button>
    </div>
</div>

<div id="panel">
    <div class="header"><h1>1NCOG SHOP BLUE</h1></div>
    
    <div class="tabs">
        <div id="btn-func" class="tab active" onclick="switchTab('func')">MOD MENU</div>
        <div id="btn-sensi" class="tab" onclick="switchTab('sensi')">SENSI</div>
        <div id="btn-info" class="tab" onclick="switchTab('info')">INFO</div>
    </div>

    <div id="tab-functions" class="scroll-area">
        <div class="option-item">
            <div class="opt-info"><h3>Otimizar FPS</h3><p>Estabiliza o sistema</p><span id="st-opt" class="status-text status-off">● DESATIVADO</span></div>
            <label class="switch"><input type="checkbox" onchange="toggleStatus(this, 'st-opt')"><span class="slider"></span></label>
        </div>
        <div class="option-item">
            <div class="opt-info"><h3>Aimbot Auxiliar</h3><p>Mira suave no inimigo</p><span id="st-aim" class="status-text status-off">● DESATIVADO</span></div>
            <label class="switch"><input type="checkbox" onchange="toggleStatus(this, 'st-aim')"><span class="slider"></span></label>
        </div>
        <div class="option-item">
            <div class="opt-info"><h3>Regedit Blue</h3><p>Ajuste interno VIP</p><span id="st-reg" class="status-text status-off">● DESATIVADO</span></div>
            <label class="switch"><input type="checkbox" onchange="toggleStatus(this, 'st-reg')"><span class="slider"></span></label>
        </div>

        <button id="btn-main" class="btn-inject-big" onclick="inyectar()">INJETAR CÓDIGOS</button>
        <button id="btn-force-open" class="btn-inject-big" onclick="abrirJogoForzado()">ABRIR JOGO ⚡</button>
    </div>

    <div id="tab-sensi" class="scroll-area" style="display:none;">
        <div class="sensi-container">
            <select id="p-sel" class="sensi-select"><option value="android">ANDROID</option><option value="ios">iOS</option><option value="pc">PC</option></select>
            <select id="t-sel" class="sensi-select"><option value="baja">SENSI BAJA</option><option value="media">SENSI MEDIA</option><option value="alta">SENSI ALTA (200)</option></select>
            <button class="btn-blue" onclick="generarSensi()">GERAR AGORA</button>

            <div id="result-sensi" class="sensi-result">
                <p>GERAL: <span id="val-g">0</span></p>
                <p>RED DOT: <span id="val-r">0</span></p>
                <p>DPI / CURSOR: <span id="val-d">0</span></p>
            </div>
        </div>
    </div>

    <div id="tab-info" class="scroll-area" style="display:none; text-align:center; color:#eee;">
        <b style="color:var(--blue); font-size:1.5rem;">@1NCOGSHOP</b>
        <p style="margin-top:20px;">KEY STATUS: <span id="duracion-key" style="color:#0f0;">---</span></p>
        <hr style="border:0; border-top:1px solid #222; margin:20px 0;">
        <a href="https://wa.me/56920012710" style="color:#0f0; text-decoration:none; border:1px solid #0f0; padding:10px; border-radius:10px; display:block;">SUPORTE WHATSAPP</a>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://ncogshop1-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showToast(m) { const t=document.getElementById('toast'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

    function toggleStatus(checkbox, id) {
        const el = document.getElementById(id);
        if(checkbox.checked) { el.innerText = "● ATIVO"; el.className = "status-text status-on"; }
        else { el.innerText = "● DESATIVADO"; el.className = "status-text status-off"; }
    }

    function validar() {
        const k = document.getElementById('key').value.trim().toUpperCase();
        if(!k) return showToast("COLE SUA KEY!");
        db.ref('tokens/' + k).once('value').then(s => {
            if(s.exists()){
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('panel').style.display = 'flex';
                document.getElementById('duracion-key').innerText = s.val().info || "ACTIVA";
                showToast("BEM-VINDO!");
            } else { showToast("KEY INVÁLIDA!"); }
        });
    }

    function switchTab(type) {
        document.getElementById('tab-functions').style.display = type==='func'?'block':'none';
        document.getElementById('tab-sensi').style.display = type==='sensi'?'block':'none';
        document.getElementById('tab-info').style.display = type==='info'?'block':'none';
        document.getElementById('btn-func').classList.toggle('active', type==='func');
        document.getElementById('btn-sensi').classList.toggle('active', type==='sensi');
        document.getElementById('btn-info').classList.toggle('active', type==='info');
    }

    function generarSensi() {
        const type = document.getElementById('t-sel').value;
        const r = (a,b) => Math.floor(Math.random()*(b-a+1)+a);
        let min = type==='alta'?170:type==='media'?90:70;
        document.getElementById('val-g').innerText = r(min, 200);
        document.getElementById('val-r').innerText = r(min, 200);
        document.getElementById('val-d').innerText = r(500, 1200);
        document.getElementById('result-sensi').style.display = 'block';
    }

    function inyectar() {
        showToast("INJETANDO...");
        setTimeout(() => { 
            document.getElementById('btn-main').style.display='none';
            document.getElementById('btn-force-open').style.display='block';
            window.location.assign("freefire://");
        }, 2000);
    }

    function abrirJogoForzado() { window.location.href = "intent://#Intent;scheme=freefire;package=com.dts.freefireth;end"; }
</script>
</body>
</html>
