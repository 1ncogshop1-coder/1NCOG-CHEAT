<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALOKSENS | BLUE EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --blue: #00d2ff; --bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background: var(--bg); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://i.ibb.co/7ds17rvH/Chat-Box-1803663890.jpg');
            background-size: cover; background-position: center;
        }

        #toast { position: fixed; top: -70px; left: 50%; transform: translateX(-50%); background: var(--blue); color: #000; padding: 15px 25px; border-radius: 30px; font-weight: 900; transition: 0.6s; z-index: 5000; width: 85%; text-align: center; box-shadow: 0 0 20px var(--blue); }
        #toast.show { top: 30px; }

        #login-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .logo-v { width: 120px; border-radius: 25px; border: 2px solid var(--blue); box-shadow: 0 0 25px var(--blue); margin-bottom: 20px; }

        #panel { display: none; width: 92%; max-width: 400px; height: 90vh; flex-direction: column; background: rgba(5,5,5,0.95); border-radius: 30px; border: 1px solid #1a1a1a; padding: 20px; }
        
        .header-panel { text-align: center; margin-bottom: 15px; }
        .logo-mini { width: 50px; border-radius: 10px; border: 1px solid var(--blue); }

        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 12px; background: #111; color: #444; border-radius: 10px; text-align: center; font-size: 0.65rem; font-weight: 900; cursor: pointer; }
        .tab.active { color: var(--blue); border: 1px solid var(--blue); background: #0a0a0a; }

        /* Switches Estilo VIP */
        .option-item { background: #0f0f0f; padding: 15px; border-radius: 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--blue); }
        .switch { position: relative; display: inline-block; width: 45px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #222; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--blue); }
        input:checked + .slider:before { transform: translateX(21px); }

        /* Generador de Sensi 200 */
        .sensi-card { background: #0a0a0a; padding: 20px; border-radius: 20px; border: 1px solid var(--blue); text-align: center; }
        .val-num { color: #fff; font-weight: 900; font-size: 1.6rem; text-shadow: 0 0 10px var(--blue); }
        
        .btn-inject { background: var(--blue); color: #000; padding: 18px; border-radius: 15px; border: none; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div id="toast">MENSAGEM</div>

<div id="login-screen">
    <img src="https://i.ibb.co/7ds17rvH/Chat-Box-1803663890.jpg" class="logo-v">
    <h1 style="color:var(--blue); font-weight:900;">@ALOKSENS</h1>
    <input type="text" id="key" placeholder="SUA KEY AQUI" style="width:280px; padding:15px; margin-top:20px; border-radius:12px; border:none; background:#111; color:#fff; border-bottom:2px solid var(--blue); text-align:center;">
    <button class="btn-inject" onclick="validar()" style="width:280px; margin-top:20px;">AUTENTICAR</button>
</div>

<div id="panel">
    <div class="header-panel">
        <img src="https://i.ibb.co/7ds17rvH/Chat-Box-1803663890.jpg" class="logo-mini">
        <h2 style="color:var(--blue); font-size:1.1rem;">@ALOKSENS BLUE</h2>
    </div>

    <div class="tabs">
        <div id="btn-func" class="tab active" onclick="switchTab('func')">FUNÇÕES</div>
        <div id="btn-sensi" class="tab" onclick="switchTab('sensi')">SENSI</div>
        <div id="btn-info" class="tab" onclick="switchTab('info')">SUPORTE</div>
    </div>

    <div id="tab-functions">
        <div class="option-item">
            <div><h4 style="color:#fff; font-size:0.8rem;">Regedit Blue VIP</h4><p style="color:#555; font-size:0.6rem;">Foco Headshot</p></div>
            <label class="switch"><input type="checkbox" onchange="vibrar()"><span class="slider"></span></label>
        </div>
        <div class="option-item">
            <div><h4 style="color:#fff; font-size:0.8rem;">Aimbot Auxiliar</h4><p style="color:#555; font-size:0.6rem;">Mira Suave 200%</p></div>
            <label class="switch"><input type="checkbox" onchange="vibrar()"><span class="slider"></span></label>
        </div>
        <div class="option-item">
            <div><h4 style="color:#fff; font-size:0.8rem;">Otimizador FPS</h4><p style="color:#555; font-size:0.6rem;">Estabilizar Lag</p></div>
            <label class="switch"><input type="checkbox" onchange="vibrar()"><span class="slider"></span></label>
        </div>
        <button class="btn-inject" onclick="inyectar()">INJETAR AGORA</button>
    </div>

    <div id="tab-sensi" style="display:none;">
        <div class="sensi-card">
            <p style="color:var(--blue); font-weight:bold; margin-bottom:15px;">GERADOR SENSI 200</p>
            <div style="display:flex; justify-content:space-around; margin-bottom:15px;">
                <div><span class="val-num" id="s-geral">0</span><br><small style="color:#555">GERAL</small></div>
                <div><span class="val-num" id="s-red">0</span><br><small style="color:#555">RED DOT</small></div>
            </div>
            <div style="margin-bottom:15px;">
                <span class="val-num" id="s-dpi">0</span><br><small style="color:#555">DPI SUGERIDA</small>
            </div>
            <button class="btn-inject" style="background:transparent; border:1px solid var(--blue); color:var(--blue);" onclick="gerarSensi()">GERAR NOVA</button>
        </div>
    </div>

    <div id="tab-info" style="display:none; text-align:center; color:#fff; padding-top:20px;">
        <h3 style="color:var(--blue);">SUPORTE: @Aloksens</h3>
        <p id="key-time" style="color:#0f0; margin:20px 0; font-weight:bold;">VERIFICANDO...</p>
        <a href="https://wa.me/56920012710" style="color:#0f0; text-decoration:none; border:1px solid #0f0; padding:15px; border-radius:15px; display:block;">WHATSAPP OFICIAL</a>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://ncogshop1-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showToast(m) { const t=document.getElementById('toast'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }
    function vibrar() { if (navigator.vibrate) navigator.vibrate(40); }

    function validar() {
        const k = document.getElementById('key').value.trim().toUpperCase();
        if(!k) return showToast("COLE SUA KEY @ALOKSENS!");
        db.ref('tokens/' + k).once('value').then(s => {
            if(s.exists()){
                const d = s.val();
                const exp = d.timestamp + (d.duracion * 86400000);
                if(d.duracion != 999 && exp < Date.now()) return showToast("KEY EXPIRADA!");
                
                document.getElementById('login-screen').style.display='none';
                document.getElementById('panel').style.display='flex';
                document.getElementById('key-time').innerText = d.duracion == 999 ? "STATUS: VITALÍCIA" : "STATUS: ATIVA";
                showToast("BEM-VINDO @ALOKSENS!");
            } else { showToast("KEY INVÁLIDA!"); }
        });
    }

    function switchTab(t) {
        document.getElementById('tab-functions').style.display = t==='func'?'block':'none';
        document.getElementById('tab-sensi').style.display = t==='sensi'?'block':'none';
        document.getElementById('tab-info').style.display = t==='info'?'block':'none';
        document.getElementById('btn-func').classList.toggle('active', t==='func');
        document.getElementById('btn-sensi').classList.toggle('active', t==='sensi');
        document.getElementById('btn-info').classList.toggle('active', t==='info');
    }

    function gerarSensi() {
        vibrar();
        document.getElementById('s-geral').innerText = Math.floor(Math.random() * (200 - 170 + 1)) + 170;
        document.getElementById('s-red').innerText = Math.floor(Math.random() * (198 - 180 + 1)) + 180;
        document.getElementById('s-dpi').innerText = Math.floor(Math.random() * (900 - 500 + 1)) + 500;
        showToast("SENSI 200 GERADA!");
    }

    function inyectar() {
        showToast("INYECTANDO @ALOKSENS BLUE...");
        vibrar();
        setTimeout(() => { showToast("✅ APLICADO! ABRA O JOGO"); window.location.href="freefire://"; }, 2000);
    }
</script>
</body>
</html>
